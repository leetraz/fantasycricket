<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD STADIUM TELEMETRY • CRICINFO PREVIEW</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06070a;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --neon-rose: #ff0055;
            --amber: #ff9900;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.5); }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }

        html, body {
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        /* Immersive Background Grid */
        .cyber-grid {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
        }

        .neon-glow {
            position: fixed;
            width: 40vw; height: 40vw;
            filter: blur(160px);
            opacity: 0.06;
            border-radius: 50%;
            z-index: -1;
        }

        .container {
            width: 100vw;
            height: 100vh;
            max-width: 1800px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
        }

        /* Navigation Header */
        header {
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex-shrink: 0;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 0.35rem 1rem;
            color: #fff;
            text-transform: uppercase;
            font-family: 'Space Grotesk';
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 12px var(--neon-blue);
            border-color: var(--neon-blue);
        }

        .title-section h1 {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-section p {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* Loading / Progress Indicator */
        .progress-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            margin-bottom: 0.5rem;
            flex-shrink: 0;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.4rem;
            font-family: 'Space Grotesk';
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar-wrapper {
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-blue), var(--amber));
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* Player Box / Cards List in Grid */
        .players-h2h-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex-grow: 1;
            min-height: 0;
            overflow-y: auto;
        }

        .players-list-header {
            display: grid;
            grid-template-columns: 240px 140px 180px 1fr;
            gap: 1rem;
            padding: 0.2rem 0.75rem;
            margin-bottom: 0.2rem;
            flex-shrink: 0;
        }

        .player-row {
            background: rgba(17, 18, 29, 0.4);
            border: 1px solid var(--glass-border);
            padding: 0.4rem 0.75rem;
            border-radius: 8px;
            font-family: 'Space Grotesk';
            display: grid;
            grid-template-columns: 240px 140px 180px 1fr;
            align-items: center;
            gap: 1rem;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.01);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .player-row:hover {
            border-color: rgba(0, 242, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.08), inset 0 0 10px rgba(0, 242, 255, 0.02);
            transform: translateX(4px);
            background: rgba(17, 18, 29, 0.65);
        }

        @media (max-width: 992px) {
            html, body {
                height: auto !important;
                max-height: none !important;
                overflow: auto !important;
                overflow-x: hidden !important;
            }
            .players-h2h-list {
                overflow-y: visible !important;
                height: auto !important;
            }
            .container {
                padding: 0.75rem;
                height: auto;
                max-height: none;
            }
            header {
                margin-bottom: 0.75rem;
            }
            h1 {
                font-size: 1.2rem;
                letter-spacing: 1px;
            }
            .subtitle {
                font-size: 0.75rem;
            }
            .players-list-header {
                display: none;
            }
            .player-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
                padding: 0.6rem 0.75rem;
            }
            .player-row:hover {
                transform: none;
            }
            /* Enable smooth horizontal scrolling for capsules on mobile touch screens */
            .player-row > div:last-child {
                width: 100%;
                overflow-x: auto;
                white-space: nowrap;
                padding-bottom: 4px;
                scrollbar-width: thin;
                scrollbar-color: rgba(0, 242, 255, 0.15) transparent;
            }
            .player-row > div:last-child::-webkit-scrollbar {
                height: 4px;
            }
            .player-row > div:last-child::-webkit-scrollbar-thumb {
                background: rgba(0, 242, 255, 0.15);
                border-radius: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>
    <div class="neon-glow" style="background: var(--neon-blue); top: -20%; left: -20%;"></div>
    <div class="neon-glow" style="background: var(--neon-purple); bottom: -20%; right: -20%;"></div>

    <div class="container">

        <header>
            <div class="header-top">
                <a href="/" class="back-btn">⚡ Back to Dashboard</a>
            </div>
            <div class="title-section">
                <h1 id="squad-title">RCB • STADIUM VENUE MATRIX</h1>
                <p id="squad-subtitle">Loading complete squad historical match performances at stadium...</p>
            </div>
        </header>

        <!-- Progress Indicator -->
        <div class="progress-container" id="loading-indicator">
            <div class="progress-header">
                <span id="progress-status">Initializing telemetry...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>

        <!-- Render List -->
        <div class="players-h2h-list" id="players-list-container">
            <!-- Dynamic player stadium comparison cards will be injected here -->
        </div>

    </div>

    <script>
        // Parse search query
        const urlParams = new URLSearchParams(window.location.search);
        const matchUrl = urlParams.get('url');
        const teamIdx = parseInt(urlParams.get('teamIdx')) || 0;
        const teamName = urlParams.get('teamName') || 'SQUAD';
        const ground = urlParams.get('ground') || 'Eden Gardens';

        document.getElementById('squad-title').textContent = `${teamName} • STADIUM VENUE MATRIX`;
        document.getElementById('squad-subtitle').textContent = `Complete historical performances at ${ground.toUpperCase()}`;

        async function init() {
            if (!matchUrl) {
                document.getElementById('progress-status').textContent = "ERROR: NO MATCH URL SUPPLIED";
                document.getElementById('progress-status').style.color = "var(--neon-rose)";
                return;
            }

            try {
                // Step 1: Load match details (squad players)
                const res = await fetch(`/api/match-data?url=${encodeURIComponent(matchUrl)}`);
                const matchData = await res.json();

                if (matchData.error) throw new Error(matchData.error);

                const activeTeamName = matchData.teams[teamIdx];
                const squadPlayers = matchData.allPlayers.filter(p => p.team === activeTeamName);

                if (squadPlayers.length === 0) {
                    throw new Error("No players found in this squad.");
                }

                document.getElementById('progress-status').textContent = `Found ${squadPlayers.length} players. Analyzing stadium profiles...`;
                
                const container = document.getElementById('players-list-container');
                
                // Append perfect symmetric column headers for dashboard
                const headerRow = document.createElement('div');
                headerRow.className = 'players-list-header';
                headerRow.innerHTML = `
                    <div style="font-family: 'Space Grotesk'; font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,0.25); letter-spacing: 1px;">
                        Player Identity
                    </div>
                    <div style="font-family: 'Space Grotesk'; font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,0.25); letter-spacing: 1px; text-align: center;">
                        Ground Matches
                    </div>
                    <div style="font-family: 'Space Grotesk'; font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,0.25); letter-spacing: 1px; text-align: center;">
                        stadium Averages
                    </div>
                    <div style="font-family: 'Space Grotesk'; font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,0.25); letter-spacing: 1px;">
                        Stadium Performances (Oldest ➔ Newest Chronological)
                    </div>
                `;
                container.appendChild(headerRow);

                const progressFill = document.getElementById('progress-fill');
                const progressPercent = document.getElementById('progress-percent');
                const progressStatus = document.getElementById('progress-status');

                // Step 2: Concurrently fetch player profiles
                let loadedCount = 0;
                const keywords = ground.toLowerCase().split(/[ ,]+/);

                for (let i = 0; i < squadPlayers.length; i++) {
                    const p = squadPlayers[i];
                    progressStatus.textContent = `Analyzing ${p.name}... (${i + 1}/${squadPlayers.length})`;
                    
                    try {
                        const opponent = matchData.teams.find(t => t !== p.team) || "OPPONENT";
                        const profileRes = await fetch(`/api/player-profile?pid=${p.player_id}&name=${encodeURIComponent(p.name)}&opponent=${encodeURIComponent(opponent)}`);
                        const profileData = await profileRes.json();

                        let groundMatches = [];
                        const matchesList = profileData.last10 || [];

                        // Filter by ground keywords
                        groundMatches = matchesList.filter(m => {
                            const groundLower = (m.ground || "").toLowerCase();
                            return keywords.some(keyword => keyword.length > 3 && groundLower.includes(keyword));
                        });

                        const isEstimated = groundMatches.length === 0;

                        // Fallback: if no venue records, synthesize realistic subset from recent matches
                        if (isEstimated && matchesList.length > 0) {
                            groundMatches = matchesList.slice(0, Math.min(5, matchesList.length)).map(m => ({
                                ...m,
                                isSynthesized: true
                            }));
                        }

                        renderPlayerCard(p, groundMatches, isEstimated, container);

                    } catch (err) {
                        console.error(`Failed to load profile for ${p.name}:`, err);
                        renderPlayerCard(p, [], true, container, true);
                    }

                    loadedCount++;
                    const percent = Math.round((loadedCount / squadPlayers.length) * 100);
                    progressFill.style.width = `${percent}%`;
                    progressPercent.textContent = `${percent}%`;
                }

                progressStatus.textContent = "SQUAD STADIUM ANALYSIS SECURED";
                progressStatus.style.color = "var(--neon-green)";
                setTimeout(() => {
                    document.getElementById('loading-indicator').style.display = 'none';
                }, 1000);

            } catch (err) {
                console.error(err);
                document.getElementById('progress-status').textContent = "ERROR LOADING MATRIX: " + err.message;
                document.getElementById('progress-status').style.color = "var(--neon-rose)";
            }
        }

        function renderPlayerCard(player, matches, isEstimated, parentContainer, isError = false) {
            const formattedName = player.name.toUpperCase();
            const avatarUrl = `https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_320/lsci/db/PICTURES/CMS/${Math.floor(player.player_id/100)}/${player.player_id}.jpg`;
            const errorAvatarUrl = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${player.name}&backgroundColor=00f2ff`;

            const row = document.createElement('div');
            row.style.marginBottom = '0.35rem';

            // Dynamic color coding indicator dot next to name based on Player Role
            const getRoleColor = (role) => {
                const r = (role || '').toLowerCase();
                if (r.includes('bowl')) return 'var(--neon-rose)';
                if (r.includes('allrounder') || r.includes('all rounder')) return 'var(--neon-purple)';
                if (r.includes('keeper') || r.includes('wk')) return 'var(--amber)';
                return 'var(--neon-green)';
            };
            const roleColor = getRoleColor(player.role);
            const roleLight = `<span style="width: 6px; height: 6px; border-radius: 50%; background-color: ${roleColor}; box-shadow: 0 0 6px ${roleColor}; flex-shrink: 0;" title="${player.role}"></span>`;

            // Compute averages
            let avgRuns = 0;
            let avgWkts = 0;
            let groundMatchCount = isEstimated ? 0 : matches.length;

            if (matches.length > 0) {
                let runsSum = 0;
                let wktsSum = 0;
                let batCount = 0;
                let bowlCount = 0;

                matches.forEach(m => {
                    if (m.bat && m.bat !== '-' && m.bat !== 'DNB' && m.bat !== 'TDNB' && m.bat !== 'absent') {
                        runsSum += parseInt(m.bat.toString().replace('*', '')) || 0;
                        batCount++;
                    }
                    if (m.bowl && m.bowl !== '-' && m.bowl !== 'DNB') {
                        wktsSum += parseInt(m.bowl) || 0;
                        bowlCount++;
                    }
                });

                avgRuns = batCount > 0 ? (runsSum / batCount).toFixed(1) : "0.0";
                avgWkts = bowlCount > 0 ? (wktsSum / bowlCount).toFixed(1) : "0.0";
            }

            const subBadge = player.isSub ? `<span style="font-family: 'Space Grotesk'; font-size: 0.6rem; font-weight: 800; background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue)); color: #fff; padding: 0.1rem 0.3rem; border-radius: 4px; text-shadow: 0 0 5px rgba(0, 242, 255, 0.4); text-transform: uppercase; border: 1px solid rgba(255, 255, 255, 0.15); margin-left: 0.3rem;">SUB</span>` : '';

            // Ground matches tag
            const matchesTag = isEstimated 
                ? `<span style="color: var(--amber); font-weight: 700; border: 1px dashed var(--amber); padding: 0.2rem 0.5rem; border-radius: 6px; font-size: 0.75rem; text-transform: uppercase;">0 (ESTIMATE)</span>`
                : `<span style="color: var(--neon-blue); font-weight: 900; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon-blue); padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.85rem;">${groundMatchCount} Matches</span>`;

            // Averages tag
            const averagesTag = `
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.1rem;">
                    <div style="font-size: 0.85rem; color: #fff; font-weight: 800;">${avgRuns} <span style="font-size: 0.65rem; color: var(--text-dim); font-weight: 400;">Runs</span></div>
                    <div style="font-size: 0.85rem; color: var(--neon-rose); font-weight: 800;">${avgWkts} <span style="font-size: 0.65rem; color: var(--text-dim); font-weight: 400;">Wkts</span></div>
                </div>
            `;

            // Helper to generate capsules
            const generateCapsules = (matchesList) => {
                if (!matchesList || matchesList.length === 0) {
                    return `<span style="color: rgba(255, 255, 255, 0.15); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;">NO RECORD</span>`;
                }

                const chronological = [...matchesList].reverse().slice(-10);

                const perfList = chronological.map(m => {
                    let text = '';
                    let isBatHigh = false;
                    let colorObj = { bg: 'rgba(255,255,255,0.03)', border: 'var(--glass-border)', text: 'rgba(255,255,255,0.85)', shadow: 'none' };
                    
                    const hasBat = m.bat && m.bat !== '-' && m.bat !== 'DNB' && m.bat !== 'TDNB' && m.bat !== 'absent';
                    const hasBowl = m.bowl && m.bowl !== '-' && m.bowl !== 'DNB';
                    
                    if (hasBat) {
                        const runs = parseInt(m.bat.toString().replace('*', '')) || 0;
                        if (runs >= 50) {
                            colorObj = { bg: 'rgba(57, 255, 20, 0.08)', border: 'var(--neon-green)', text: 'var(--neon-green)', shadow: '0 0 8px rgba(57, 255, 20, 0.35)' };
                        } else if (runs >= 30) {
                            colorObj = { bg: 'rgba(166, 255, 0, 0.06)', border: '#a6ff00', text: '#a6ff00', shadow: 'none' };
                        } else if (runs >= 20) {
                            colorObj = { bg: 'rgba(255, 234, 0, 0.05)', border: '#ffea00', text: '#ffea00', shadow: 'none' };
                        } else if (runs >= 10) {
                            colorObj = { bg: 'rgba(255, 153, 0, 0.04)', border: '#ff9900', text: '#ff9900', shadow: 'none' };
                        } else {
                            colorObj = { bg: 'rgba(255, 0, 85, 0.04)', border: '#ff0055', text: '#ff0055', shadow: 'none' };
                        }
                        text = m.bat.toString();
                        isBatHigh = true;
                    }
                    
                    if (hasBowl) {
                        const wkts = parseInt(m.bowl) || 0;
                        const bowlText = `${m.bowl}W`;
                        text = text ? `${text} ${bowlText}` : bowlText;
                        
                        if (!isBatHigh || wkts > 0) {
                            if (wkts >= 3) {
                                colorObj = { bg: 'rgba(57, 255, 20, 0.08)', border: 'var(--neon-green)', text: 'var(--neon-green)', shadow: '0 0 8px rgba(57, 255, 20, 0.35)' };
                            } else if (wkts >= 2) {
                                colorObj = { bg: 'rgba(166, 255, 0, 0.06)', border: '#a6ff00', text: '#a6ff00', shadow: 'none' };
                            } else if (wkts >= 1) {
                                colorObj = { bg: 'rgba(255, 234, 0, 0.05)', border: '#ffea00', text: '#ffea00', shadow: 'none' };
                            } else {
                                if (!isBatHigh) {
                                    colorObj = { bg: 'rgba(255, 0, 85, 0.04)', border: '#ff0055', text: '#ff0055', shadow: 'none' };
                                }
                            }
                        }
                    }
                    
                    if (!hasBat && !hasBowl) {
                        text = 'DNB';
                        colorObj = { bg: 'rgba(255,255,255,0.01)', border: 'rgba(255,255,255,0.02)', text: 'rgba(255,255,255,0.15)', shadow: 'none' };
                    }

                    const estStyle = m.isSynthesized ? 'border-style: dashed;' : '';
                    const styleString = `background: ${colorObj.bg}; border: 1px solid ${colorObj.border}; color: ${colorObj.text}; box-shadow: ${colorObj.shadow}; ${estStyle}`;

                    return `<span style="display: inline-flex; align-items: center; justify-content: center; padding: 0 0.4rem; min-width: 44px; height: 26px; border-radius: 6px; font-family: 'Space Grotesk'; font-size: 0.85rem; font-weight: 700; ${styleString}" title="${m.ground || ''} • ${m.date || ''}">${text}</span>`;
                });

                const fallbackTag = isEstimated ? `<span style="color: var(--amber); font-size: 0.6rem; font-weight: 800; border: 1px dashed var(--amber); padding: 0.15rem 0.35rem; border-radius: 4px; text-transform: uppercase; margin-right: 0.4rem; display: inline-flex; align-items: center;" title="General Form Fallback (No Stadium Matches Found)">🏟️ EST</span>` : '';

                return `<div style="display: flex; align-items: center; gap: 0.3rem; flex-wrap: nowrap; overflow-x: auto; min-width: 0;">${fallbackTag}${perfList.join(' ')}</div>`;
            };

            if (isError) {
                row.className = 'player-row';
                row.style.background = 'rgba(255, 0, 85, 0.015)';
                row.style.borderColor = 'rgba(255, 0, 85, 0.15)';
                row.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.75rem; min-width: 0;">
                        <img src="${avatarUrl}" onerror="this.src='${errorAvatarUrl}'" style="width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--neon-rose);" alt="${player.name}">
                        ${roleLight}
                        <span style="color: rgba(255,255,255,0.4); font-weight: 700; text-transform: uppercase; font-size: 0.95rem; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${player.name}</span>
                    </div>
                    <div colspan="3" style="color: var(--neon-rose); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; text-align: center;">
                        ⚠️ ERROR SECURING STADIUM VENUE DATA
                    </div>
                `;
            } else {
                row.className = 'player-row';
                row.innerHTML = `
                    <!-- Player Column -->
                    <div style="display: flex; align-items: center; gap: 0.75rem; min-width: 0;">
                        <img src="${avatarUrl}" onerror="this.src='${errorAvatarUrl}'" style="width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--neon-blue); box-shadow: 0 0 8px rgba(0, 242, 255, 0.1);" alt="${player.name}">
                        ${roleLight}
                        <span style="color: #fff; font-weight: 700; text-transform: uppercase; font-size: 0.95rem; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${player.name}">${player.name}${subBadge}</span>
                    </div>
                    <!-- Ground Matches Column -->
                    <div style="text-align: center;">
                        ${matchesTag}
                    </div>
                    <!-- Stadium Averages Column -->
                    <div style="text-align: center;">
                        ${averagesTag}
                    </div>
                    <!-- Capsules Column -->
                    ${generateCapsules(matches)}
                `;
            }

            parentContainer.appendChild(row);
        }

        // Run initializer
        init();
    </script>
</body>
</html>
