<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD RECENT FORM // CRICINFO PREVIEW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0b10;
            --card-bg: rgba(17, 18, 29, 0.6);
            --neon-blue: #00f2ff;
            --neon-purple: #9d00ff;
            --neon-rose: #ff0055;
            --neon-green: #39ff14;
            --amber: #ffaa00;
            --glass-border: rgba(255, 255, 255, 0.05);
            --font-main: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: var(--font-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Abstract Cyber Grid Background */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
            pointer-events: none;
        }

        .neon-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.12;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: 100vh;
            max-height: 100vh;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: rgba(255, 255, 255, 0.6);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-family: var(--font-main);
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--neon-blue);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, rgba(255,255,255,0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Squad analysis loader progress container */
        #loading-indicator {
            background: rgba(17, 18, 29, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .loader-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-blue), var(--amber));
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* High-Tech Tabular Grid System */
        .table-viewport {
            width: 100%;
            overflow-x: auto;
            flex-grow: 1;
            min-height: 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 242, 255, 0.3) rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: rgba(10, 11, 16, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .table-viewport::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }
        .table-viewport::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 255, 0.3);
            border-radius: 3px;
        }
        .table-viewport::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .table-grid {
            min-width: 1250px;
            display: flex;
            flex-direction: column;
            padding: 0.5rem;
            flex-grow: 1;
            overflow-y: auto;
        }

        .players-list-header {
            display: grid;
            grid-template-columns: 240px 140px repeat(10, 1fr) 110px;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 0.5rem;
            align-items: center;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            flex-shrink: 0;
            border-radius: 8px 8px 0 0;
        }

        .player-row {
            background: rgba(17, 18, 29, 0.3);
            border: 1px solid var(--glass-border);
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-family: var(--font-main);
            display: grid;
            grid-template-columns: 240px 140px repeat(10, 1fr) 110px;
            align-items: center;
            gap: 0.5rem;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.01);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 0.4rem;
        }

        .player-row:hover {
            border-color: rgba(0, 242, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.08), inset 0 0 10px rgba(0, 242, 255, 0.02);
            transform: translateX(4px);
            background: rgba(17, 18, 29, 0.6);
        }

        @media (max-width: 768px) {
            html, body {
                height: auto !important;
                max-height: none !important;
                overflow: auto !important;
                overflow-x: hidden !important;
            }
            .table-viewport {
                overflow-x: auto !important;
                height: auto !important;
                max-height: none !important;
            }
            .table-grid {
                min-width: 1250px !important;
                overflow-y: visible !important;
            }
            .container {
                padding: 0.75rem;
                height: auto;
                max-height: none;
            }
            header {
                margin-bottom: 0.75rem;
            }
            h1 {
                font-size: 1.2rem;
                letter-spacing: 1px;
            }
            .subtitle {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>
    <div class="neon-glow" style="background: var(--neon-blue); top: -20%; left: -20%;"></div>
    <div class="neon-glow" style="background: var(--neon-purple); bottom: -20%; right: -20%;"></div>

    <div class="container">

        <header>
            <div class="header-top">
                <a href="/" class="back-btn">⚡ Back to Dashboard</a>
            </div>
            <h1 id="squad-title">LOADING MATRIX...</h1>
            <div class="subtitle" id="squad-subtitle">Initializing general recent matches...</div>
        </header>

        <!-- Loading indicator dashboard -->
        <div id="loading-indicator">
            <div class="loader-meta">
                <span id="progress-status" style="color: var(--neon-blue)">Secure link established. Initiating player scrape...</span>
                <span id="progress-percent" style="color: var(--amber)">0%</span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-fill"></div>
            </div>
        </div>

        <!-- Render Table Viewport for perfect wide alignment -->
        <div class="table-viewport">
            <div class="table-grid" id="players-list-container">
                <!-- Dynamic Player details rows injected here -->
            </div>
        </div>

    </div>

    <script>
        // Resolve canonical team names for consistency
        const getCanonicalTeam = (name) => {
            if (!name) return "";
            name = name.toUpperCase().trim();
            if (name.includes("CHENNAI") || name.includes("CSK") || name.includes("SUPER KINGS")) {
                return "CSK";
            }
            if (name.includes("MUMBAI") || name.includes("MI") || name.includes("INDIANS")) {
                return "MI";
            }
            if (name.includes("ROYAL CHALLENGERS") || name.includes("RCB") || name.includes("BENGALURU")) {
                return "RCB";
            }
            if (name.includes("KOLKATA") || name.includes("KKR") || name.includes("KNIGHT RIDERS")) {
                return "KKR";
            }
            if (name.includes("RAJASTHAN") || name.includes("RR") || name.includes("ROYALS")) {
                return "RR";
            }
            if (name.includes("PUNJAB") || name.includes("PBKS") || name.includes("KINGS")) {
                return "PBKS";
            }
            if (name.includes("DELHI") || name.includes("DC") || name.includes("CAPITALS")) {
                return "DC";
            }
            if (name.includes("SUNRISERS") || name.includes("SRH") || name.includes("HYDERABAD")) {
                return "SRH";
            }
            if (name.includes("GUJARAT") || name.includes("GT") || name.includes("TITANS")) {
                return "GT";
            }
            if (name.includes("LUCKNOW") || name.includes("LSG") || name.includes("SUPER GIANTS")) {
                return "LSG";
            }
            return name;
        };

        // Parse search query
        const urlParams = new URLSearchParams(window.location.search);
        const matchUrl = urlParams.get('url');
        const teamIdx = parseInt(urlParams.get('teamIdx')) || 0;
        const teamName = urlParams.get('teamName') || 'SQUAD';

        document.getElementById('squad-title').textContent = `${teamName} // SQUAD RECENT FORM`;
        document.getElementById('squad-subtitle').textContent = `Chronological recent player performance data (All formats)`;

        async function init() {
            if (!matchUrl) {
                document.getElementById('progress-status').textContent = "ERROR: NO MATCH URL SUPPLIED";
                document.getElementById('progress-status').style.color = "var(--neon-rose)";
                return;
            }

            try {
                // Step 1: Load match details (squad players)
                const res = await fetch(`/api/match-data?url=${encodeURIComponent(matchUrl)}`);
                const matchData = await res.json();

                if (matchData.error) throw new Error(matchData.error);

                const activeTeamName = matchData.teams[teamIdx];
                const squadPlayers = matchData.allPlayers.filter(p => p.team === activeTeamName);

                if (squadPlayers.length === 0) {
                    throw new Error("No players found in this squad.");
                }

                document.getElementById('progress-status').textContent = `Found ${squadPlayers.length} players. Querying recent form...`;
                
                const container = document.getElementById('players-list-container');
                
                // Append perfect symmetric column headers for dashboard
                const headerRow = document.createElement('div');
                headerRow.className = 'players-list-header';
                headerRow.innerHTML = `
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800;">Player Identity</div>
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800; text-align: center;">Role</div>
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800; text-align: center;">M1 (Latest)</div>
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800; text-align: center;">M2</div>
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800; text-align: center;">M3</div>
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800; text-align: center;">M4</div>
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800; text-align: center;">M5</div>
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800; text-align: center;">M6</div>
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800; text-align: center;">M7</div>
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800; text-align: center;">M8</div>
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800; text-align: center;">M9</div>
                    <div style="color: rgba(255,255,255,0.3); font-weight: 800; text-align: center;">M10 (Oldest)</div>
                    <div style="color: var(--neon-purple); font-weight: 800; text-align: right;">Form Index</div>
                `;
                container.appendChild(headerRow);

                const progressFill = document.getElementById('progress-fill');
                const progressPercent = document.getElementById('progress-percent');
                const progressStatus = document.getElementById('progress-status');

                // Step 2: Concurrently fetch player profiles (with slight delay to avoid server hammering)
                let loadedCount = 0;

                for (let i = 0; i < squadPlayers.length; i++) {
                    const p = squadPlayers[i];
                    progressStatus.textContent = `Analyzing ${p.name}... (${i + 1}/${squadPlayers.length})`;
                    
                    try {
                        const profileRes = await fetch(`/api/player-profile?pid=${p.player_id}&name=${encodeURIComponent(p.name)}`);
                        const profileData = await profileRes.json();

                        const overallMatches = profileData.last10 || [];
                        renderPlayerCard(p, overallMatches, container);

                    } catch (err) {
                        console.error(`Failed to load profile for ${p.name}:`, err);
                        // Render card with fallback error
                        renderPlayerCard(p, [], container, true);
                    }

                    loadedCount++;
                    const percent = Math.round((loadedCount / squadPlayers.length) * 100);
                    progressFill.style.width = `${percent}%`;
                    progressPercent.textContent = `${percent}%`;
                }

                progressStatus.textContent = "SQUAD ANALYSIS SECURED";
                progressStatus.style.color = "var(--neon-green)";
                setTimeout(() => {
                    document.getElementById('loading-indicator').style.display = 'none';
                }, 1000);

            } catch (err) {
                console.error(err);
                document.getElementById('progress-status').textContent = "ERROR LOADING MATRIX: " + err.message;
                document.getElementById('progress-status').style.color = "var(--neon-rose)";
            }
        }

        function renderPlayerCard(player, matches, parentContainer, isError = false) {
            const formattedName = player.name.toUpperCase();
            const avatarUrl = `https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_320/lsci/db/PICTURES/CMS/${Math.floor(player.player_id/100)}/${player.player_id}.jpg`;
            const errorAvatarUrl = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${player.name}&backgroundColor=00f2ff`;

            const row = document.createElement('div');
            row.style.marginBottom = '0.35rem';

            // Dynamic color coding indicator dot next to name based on Player Role
            const getRoleColor = (role) => {
                const r = (role || '').toLowerCase();
                if (r.includes('bowl')) return 'var(--neon-rose)';
                if (r.includes('allrounder') || r.includes('all rounder') || r.includes('all-rounder')) return 'var(--neon-purple)';
                if (r.includes('keeper') || r.includes('wk')) return 'var(--amber)';
                return 'var(--neon-green)'; // default Batter
            };
            const roleColor = getRoleColor(player.role);
            const roleLight = `<span style="width: 6px; height: 6px; border-radius: 50%; background-color: ${roleColor}; box-shadow: 0 0 6px ${roleColor}; flex-shrink: 0;" title="${player.role}"></span>`;

            const getRoleLabel = (role) => {
                const r = (role || '').toLowerCase();
                if (r.includes('bowl')) return 'BOWLER';
                if (r.includes('allrounder') || r.includes('all rounder') || r.includes('all-rounder')) return 'ALL-ROUNDER';
                if (r.includes('keeper') || r.includes('wk')) return 'WK-KEEPER';
                return 'BATSMAN';
            };
            const roleLabel = getRoleLabel(player.role);

            // Form Index calculations
            const calculateFormFactor = (matchesList) => {
                if (!matchesList || matchesList.length === 0) return 0;
                let runs = 0;
                let wkts = 0;
                let playedCount = 0;
                matchesList.forEach(m => {
                    const hasBat = m.bat && m.bat !== '-' && m.bat !== 'DNB' && m.bat !== 'TDNB' && m.bat !== 'absent';
                    const hasBowl = m.bowl && m.bowl !== '-' && m.bowl !== 'DNB';
                    if (hasBat || hasBowl) playedCount++;
                    if (hasBat) {
                        runs += parseInt(m.bat.toString().replace('*', '')) || 0;
                    }
                    if (hasBowl) {
                        wkts += parseInt(m.bowl) || 0;
                    }
                });
                if (playedCount === 0) return 0;
                const score = (runs / playedCount) * 1.0 + (wkts / playedCount) * 20.0;
                return Math.min(99, Math.round(score));
            };
            const formFactor = calculateFormFactor(matches);
            let formColor = 'var(--neon-green)';
            if (formFactor < 40) formColor = 'var(--neon-rose)';
            else if (formFactor < 65) formColor = 'var(--amber)';

            // helper to map and pad match history slots exactly
            const generateTabularCapsules = (matchesList) => {
                const chronological = [...matchesList].reverse().slice(-10);
                while (chronological.length < 10) {
                    chronological.push({ bat: '-', bowl: '-' });
                }

                return chronological.map(m => {
                    let text = '';
                    let colorObj = { bg: 'rgba(255,255,255,0.02)', border: 'rgba(255,255,255,0.03)', text: 'rgba(255,255,255,0.15)', shadow: 'none' };
                    
                    const hasBat = m.bat && m.bat !== '-' && m.bat !== 'DNB' && m.bat !== 'TDNB' && m.bat !== 'absent';
                    const hasBowl = m.bowl && m.bowl !== '-' && m.bowl !== 'DNB';
                    
                    if (hasBat) {
                        const runs = parseInt(m.bat.toString().replace('*', '')) || 0;
                        if (runs >= 50) {
                            colorObj = { bg: 'rgba(57, 255, 20, 0.08)', border: 'var(--neon-green)', text: 'var(--neon-green)', shadow: '0 0 8px rgba(57, 255, 20, 0.35)' };
                        } else if (runs >= 30) {
                            colorObj = { bg: 'rgba(166, 255, 0, 0.06)', border: '#a6ff00', text: '#a6ff00', shadow: 'none' };
                        } else if (runs >= 20) {
                            colorObj = { bg: 'rgba(255, 234, 0, 0.05)', border: '#ffea00', text: '#ffea00', shadow: 'none' };
                        } else if (runs >= 10) {
                            colorObj = { bg: 'rgba(255, 153, 0, 0.04)', border: '#ff9900', text: '#ff9900', shadow: 'none' };
                        } else {
                            colorObj = { bg: 'rgba(255, 0, 85, 0.04)', border: '#ff0055', text: '#ff0055', shadow: 'none' };
                        }
                        text = m.bat.toString();
                    }
                    
                    if (hasBowl) {
                        const wkts = parseInt(m.bowl) || 0;
                        const bowlText = `${m.bowl}W`;
                        text = text ? `${text} ${bowlText}` : bowlText;
                        
                        if (!hasBat || wkts > 0) {
                            if (wkts >= 3) {
                                colorObj = { bg: 'rgba(57, 255, 20, 0.08)', border: 'var(--neon-green)', text: 'var(--neon-green)', shadow: '0 0 8px rgba(57, 255, 20, 0.35)' };
                            } else if (wkts >= 2) {
                                colorObj = { bg: 'rgba(166, 255, 0, 0.06)', border: '#a6ff00', text: '#a6ff00', shadow: 'none' };
                            } else if (wkts >= 1) {
                                colorObj = { bg: 'rgba(255, 234, 0, 0.05)', border: '#ffea00', text: '#ffea00', shadow: 'none' };
                            } else {
                                if (!hasBat) {
                                    colorObj = { bg: 'rgba(255, 0, 85, 0.04)', border: '#ff0055', text: '#ff0055', shadow: 'none' };
                                }
                            }
                        }
                    }
                    
                    if (!hasBat && !hasBowl) {
                        text = '-';
                        colorObj = { bg: 'transparent', border: 'rgba(255,255,255,0.03)', text: 'rgba(255,255,255,0.15)', shadow: 'none' };
                    }

                    const styleString = `background: ${colorObj.bg}; border: 1px solid ${colorObj.border}; color: ${colorObj.text}; box-shadow: ${colorObj.shadow};`;
                    return `<div style="display: flex; align-items: center; justify-content: center; height: 30px; width: 100%;"><span style="display: inline-flex; align-items: center; justify-content: center; padding: 0 0.4rem; min-width: 44px; height: 26px; border-radius: 6px; font-family: 'Space Grotesk'; font-size: 0.85rem; font-weight: 700; ${styleString}">${text}</span></div>`;
                }).join('');
            };

            if (isError) {
                row.className = 'player-row';
                row.style.background = 'rgba(255, 0, 85, 0.015)';
                row.style.borderColor = 'rgba(255, 0, 85, 0.15)';
                row.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.75rem; min-width: 0;">
                        <img src="${avatarUrl}" onerror="this.src='${errorAvatarUrl}'" style="width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--neon-rose);" alt="${player.name}">
                        ${roleLight}
                        <span style="color: rgba(255,255,255,0.4); font-weight: 700; text-transform: uppercase; font-size: 0.95rem; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${player.name}</span>
                    </div>
                    <div style="font-size: 0.75rem; font-weight: bold; color: rgba(255,255,255,0.25); text-align: center;">UNKNOWN</div>
                    <div style="grid-column: span 10; color: var(--neon-rose); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; text-align: center;">
                        ⚠️ ERROR SECURING RECENT FORM DATA
                    </div>
                    <div style="text-align: right; color: rgba(255,255,255,0.15); font-weight: 700; font-size: 0.95rem;">-</div>
                `;
            } else {
                row.className = 'player-row';
                row.innerHTML = `
                    <!-- Player Column -->
                    <div style="display: flex; align-items: center; gap: 0.75rem; min-width: 0;">
                        <img src="${avatarUrl}" onerror="this.src='${errorAvatarUrl}'" style="width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--neon-blue); box-shadow: 0 0 8px rgba(0, 242, 255, 0.1);" alt="${player.name}">
                        ${roleLight}
                        <span style="color: #fff; font-weight: 700; text-transform: uppercase; font-size: 0.95rem; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${player.name}</span>
                    </div>
                    <!-- Role Column -->
                    <div style="font-size: 0.75rem; font-weight: bold; color: ${roleColor}; text-align: center; text-transform: uppercase; letter-spacing: 0.5px;">
                        ${roleLabel}
                    </div>
                    <!-- Match Columns -->
                    ${generateTabularCapsules(matches)}
                    <!-- Form Factor Column -->
                    <div style="text-align: right; font-family: 'Space Grotesk'; font-size: 0.95rem; font-weight: 900; color: ${formColor}; text-shadow: 0 0 8px ${formColor}40;">
                        🔥 ${formFactor}
                    </div>
                `;
            }

            parentContainer.appendChild(row);
        }

        // Run initializer
        init();
    </script>
</body>
</html>
