<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD H2H ANALYSIS // CRICINFO PREVIEW</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06070a;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --neon-rose: #ff0055;
            --amber: #ff9900;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.5); }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }

        html, body {
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        /* Immersive Background Grid */
        .cyber-grid {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
        }

        .neon-glow {
            position: fixed;
            width: 40vw; height: 40vw;
            filter: blur(160px);
            opacity: 0.06;
            border-radius: 50%;
            z-index: -1;
        }

        .container {
            width: 100vw;
            height: 100vh;
            max-width: 1800px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
        }

        /* Navigation Header */
        header {
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex-shrink: 0;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 0.35rem 1rem;
            color: #fff;
            text-transform: uppercase;
            font-family: 'Space Grotesk';
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 12px var(--neon-blue);
            border-color: var(--neon-blue);
        }

        .title-section h1 {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-section p {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* Loading / Progress Indicator */
        .progress-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            margin-bottom: 0.5rem;
            flex-shrink: 0;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.4rem;
            font-family: 'Space Grotesk';
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar-wrapper {
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-blue), var(--amber));
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* Player Box / Cards List in Grid */
        .players-h2h-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.4rem;
            flex-grow: 1;
            min-height: 0;
            overflow-y: auto;
            align-content: start;
        }

        @media (min-width: 1200px) {
            .players-h2h-list {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .players-h2h-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>
    <div class="neon-glow" style="background: var(--neon-blue); top: -20%; left: -20%;"></div>
    <div class="neon-glow" style="background: var(--neon-purple); bottom: -20%; right: -20%;"></div>

    <div class="container">

        <header>
            <div class="header-top">
                <a href="/" class="back-btn">⚡ Back to Dashboard</a>
            </div>
            <div class="title-section">
                <h1 id="squad-title">RCB // SQUAD H2H MATRIX</h1>
                <p id="squad-subtitle">Loading complete squad historical matchups...</p>
            </div>
        </header>

        <!-- Progress Indicator -->
        <div class="progress-container" id="loading-indicator">
            <div class="progress-header">
                <span id="progress-status">Initializing sensors...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>

        <!-- Render List -->
        <div class="players-h2h-list" id="players-list-container">
            <!-- Dynamic player H2H cards will be injected here -->
        </div>

    </div>

    <script>
        // High-Fidelity Canonical Team Matching Logic
        const getCanonicalTeam = (teamName) => {
            const name = teamName.toUpperCase().trim();
            if (name.includes("PUNJAB") || name.includes("PBKS") || name.includes("KXIP") || name.includes("KINGS XI")) {
                return "PBKS";
            }
            if (name.includes("CHENNAI") || name.includes("CSK") || name.includes("SUPER KINGS")) {
                return "CSK";
            }
            if (name.includes("MUMBAI") || name.includes("MI") || name.includes("INDIANS")) {
                return "MI";
            }
            if (name.includes("KOLKATA") || name.includes("KKR") || name.includes("KNIGHT RIDERS")) {
                return "KKR";
            }
            if (name.includes("ROYAL CHALLENGERS") || name.includes("RCB") || name.includes("BANGALORE") || name.includes("BENGALURU")) {
                return "RCB";
            }
            if (name.includes("DELHI") || name.includes("DC") || name.includes("DAREDEVILS") || name.includes("CAPITALS")) {
                return "DC";
            }
            if (name.includes("RAJASTHAN") || name.includes("RR") || name.includes("ROYALS")) {
                return "RR";
            }
            if (name.includes("SUNRISERS") || name.includes("SRH") || name.includes("HYDERABAD") || name.includes("DECCAN") || name.includes("CHARGERS")) {
                return "SRH";
            }
            if (name.includes("GUJARAT") || name.includes("GT") || name.includes("TITANS")) {
                return "GT";
            }
            if (name.includes("LUCKNOW") || name.includes("LSG") || name.includes("SUPER GIANTS")) {
                return "LSG";
            }
            return name;
        };

        // Parse search query
        const urlParams = new URLSearchParams(window.location.search);
        const matchUrl = urlParams.get('url');
        const teamIdx = parseInt(urlParams.get('teamIdx')) || 0;
        const opponent = urlParams.get('opponent') || 'OPPONENT';
        const teamName = urlParams.get('teamName') || 'SQUAD';

        document.getElementById('squad-title').textContent = `${teamName} // H2H SQUAD MATRIX`;
        document.getElementById('squad-subtitle').textContent = `Complete historical head-to-head data against ${opponent}`;

        async function init() {
            if (!matchUrl) {
                document.getElementById('progress-status').textContent = "ERROR: NO MATCH URL SUPPLIED";
                document.getElementById('progress-status').style.color = "var(--neon-rose)";
                return;
            }

            try {
                // Step 1: Load match details (squad players)
                const res = await fetch(`/api/match-data?url=${encodeURIComponent(matchUrl)}`);
                const matchData = await res.json();

                if (matchData.error) throw new Error(matchData.error);

                const activeTeamName = matchData.teams[teamIdx];
                const squadPlayers = matchData.allPlayers.filter(p => p.team === activeTeamName);

                if (squadPlayers.length === 0) {
                    throw new Error("No players found in this squad.");
                }

                document.getElementById('progress-status').textContent = `Found ${squadPlayers.length} players. Initializing H2H query...`;
                
                const container = document.getElementById('players-list-container');
                const progressFill = document.getElementById('progress-fill');
                const progressPercent = document.getElementById('progress-percent');
                const progressStatus = document.getElementById('progress-status');

                // Step 2: Concurrently fetch player profiles (with slight delay to avoid server hammering)
                let loadedCount = 0;
                const targetCanonical = getCanonicalTeam(opponent);

                for (let i = 0; i < squadPlayers.length; i++) {
                    const p = squadPlayers[i];
                    progressStatus.textContent = `Analyzing ${p.name}... (${i + 1}/${squadPlayers.length})`;
                    
                    try {
                        const profileRes = await fetch(`/api/player-profile?pid=${p.player_id}&name=${encodeURIComponent(p.name)}&opponent=${encodeURIComponent(opponent)}`);
                        const profileData = await profileRes.json();

                        // Filter H2H matches against the opponent team exactly
                        let h2hMatches = [];
                        if (profileData.last10) {
                            h2hMatches = profileData.last10.filter(m => {
                                const oppClean = m.opp.replace(/^V\s+/, '').replace(/^v\s+/, '').trim();
                                return getCanonicalTeam(oppClean) === targetCanonical;
                            });
                        }

                        renderPlayerCard(p, h2hMatches, container);

                    } catch (err) {
                        console.error(`Failed to load profile for ${p.name}:`, err);
                        // Render card with fallback error
                        renderPlayerCard(p, [], container, true);
                    }

                    loadedCount++;
                    const percent = Math.round((loadedCount / squadPlayers.length) * 100);
                    progressFill.style.width = `${percent}%`;
                    progressPercent.textContent = `${percent}%`;
                }

                progressStatus.textContent = "SQUAD ANALYSIS SECURED";
                progressStatus.style.color = "var(--neon-green)";
                setTimeout(() => {
                    document.getElementById('loading-indicator').style.display = 'none';
                }, 1000);

            } catch (err) {
                console.error(err);
                document.getElementById('progress-status').textContent = "ERROR LOADING MATRIX: " + err.message;
                document.getElementById('progress-status').style.color = "var(--neon-rose)";
            }
        }

        function renderPlayerCard(player, matches, parentContainer, isError = false) {
            const formattedName = player.name.toUpperCase();
            const avatarUrl = `https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_320/lsci/db/PICTURES/CMS/${Math.floor(player.player_id/100)}/${player.player_id}.jpg`;
            const errorAvatarUrl = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${player.name}&backgroundColor=00f2ff`;

            const row = document.createElement('div');
            row.style.marginBottom = '0.35rem';

            if (isError) {
                row.innerHTML = `
                    <div style="background: rgba(255, 0, 85, 0.02); border: 1px dashed rgba(255, 0, 85, 0.2); padding: 0.4rem 0.75rem; border-radius: 8px; font-family: 'Space Grotesk'; font-size: 0.9rem; display: flex; align-items: center; justify-content: space-between;">
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <img src="${avatarUrl}" onerror="this.src='${errorAvatarUrl}'" style="width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--neon-rose);" alt="${player.name}">
                            <div>
                                <span style="color: rgba(255,255,255,0.4); font-weight: 700; text-transform: uppercase; margin-right: 0.4rem;">${player.name}:</span>
                                <span style="color: var(--neon-rose); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px;">⚠️ ERROR DECRYPTING</span>
                            </div>
                        </div>
                    </div>
                `;
            } else if (matches.length === 0) {
                row.innerHTML = `
                    <div style="background: rgba(255, 0, 85, 0.015); border: 1px dashed rgba(255, 0, 85, 0.12); padding: 0.4rem 0.75rem; border-radius: 8px; font-family: 'Space Grotesk'; font-size: 0.9rem; display: flex; align-items: center; justify-content: space-between;">
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <img src="${avatarUrl}" onerror="this.src='${errorAvatarUrl}'" style="width: 28px; height: 28px; border-radius: 6px; border: 1px solid rgba(255, 0, 85, 0.25);" alt="${player.name}">
                            <div>
                                <span style="color: rgba(255,255,255,0.4); font-weight: 700; text-transform: uppercase; margin-right: 0.4rem;">${player.name}:</span>
                                <span style="color: rgba(255, 255, 255, 0.2); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px;">NO DIRECT DATA AGAINST ${opponent}</span>
                            </div>
                        </div>
                        <a href="player.html?pid=${player.player_id}&objectId=${player.object_id}&name=${encodeURIComponent(player.name)}&role=${encodeURIComponent(player.role)}&opponent=${encodeURIComponent(opponent)}" 
                           target="_blank" class="back-btn" style="padding: 0.2rem 0.45rem; font-size: 0.7rem; border-color: rgba(255, 0, 85, 0.2); color: rgba(255, 0, 85, 0.4); background: transparent;">
                           H2H ➔
                        </a>
                    </div>
                `;
            } else {
                // Reverse the matches array to display in oldest-to-newest chronological order
                const chronologicalMatches = [...matches].reverse();

                const perfList = chronologicalMatches.map(m => {
                    let text = '';
                    let isHighBat = false;
                    let isMedBat = false;
                    let isHighBowl = false;
                    let isMedBowl = false;
                    
                    const hasBat = m.bat && m.bat !== '-' && m.bat !== 'DNB' && m.bat !== 'TDNB' && m.bat !== 'absent';
                    const hasBowl = m.bowl && m.bowl !== '-' && m.bowl !== 'DNB';
                    
                    if (hasBat) {
                        const runs = parseInt(m.bat.toString().replace('*', '')) || 0;
                        if (runs >= 50) isHighBat = true;
                        else if (runs >= 30) isMedBat = true;
                        
                        text = m.bat.toString(); // runs only (e.g. "85" or "85*")
                    }
                    
                    if (hasBowl) {
                        const wkts = parseInt(m.bowl) || 0;
                        if (wkts >= 3) isHighBowl = true;
                        else if (wkts >= 2) isMedBowl = true;
                        
                        const bowlText = `${m.bowl}wk`; // how much wicket followed by 2 letters: wk
                        text = text ? `${text} ${bowlText}` : bowlText;
                    }
                    
                    if (!hasBat && !hasBowl) {
                        text = 'DNB';
                    }

                    // Choose styling for the square/rectangle match capsule
                    let style = 'background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: rgba(255,255,255,0.85);';
                    if (isHighBat) {
                        style = 'background: rgba(57, 255, 20, 0.08); border: 1px solid var(--neon-green); color: var(--neon-green); box-shadow: 0 0 8px rgba(57, 255, 20, 0.35);';
                    } else if (isMedBat) {
                        style = 'background: rgba(57, 255, 20, 0.03); border: 1px solid #39ff14; color: #39ff14;';
                    } else if (isHighBowl) {
                        style = 'background: rgba(255, 0, 85, 0.08); border: 1px solid var(--neon-rose); color: var(--neon-rose); box-shadow: 0 0 8px rgba(255, 0, 85, 0.35);';
                    } else if (isMedBowl) {
                        style = 'background: rgba(255, 0, 85, 0.03); border: 1px solid #ff0055; color: #ff0055;';
                    } else if (text === 'DNB') {
                        style = 'background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.02); color: rgba(255,255,255,0.15);';
                    }

                    return `<span style="display: inline-flex; align-items: center; justify-content: center; padding: 0 0.4rem; min-width: 44px; height: 26px; border-radius: 6px; font-family: 'Space Grotesk'; font-size: 0.85rem; font-weight: 700; ${style}">${text}</span>`;
                });

                const finalPerfHTML = perfList.length > 0 ? perfList.join(' ') : '<span style="color: rgba(255,255,255,0.15);">DNB</span>';

                row.innerHTML = `
                    <div style="background: rgba(17, 18, 29, 0.4); border: 1px solid var(--glass-border); padding: 0.4rem 0.75rem; border-radius: 8px; font-family: 'Space Grotesk'; display: flex; align-items: center; justify-content: space-between; box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.01); transition: all 0.2s;"
                         onmouseover="this.style.borderColor='rgba(0, 242, 255, 0.3)'; this.style.boxShadow='inset 0 0 15px rgba(0, 242, 255, 0.03)';"
                         onmouseout="this.style.borderColor='var(--glass-border)'; this.style.boxShadow='inset 0 0 10px rgba(0, 242, 255, 0.01)';">
                        <div style="display: flex; align-items: center; gap: 0.75rem; flex-grow: 1; min-width: 0;">
                            <img src="${avatarUrl}" onerror="this.src='${errorAvatarUrl}'" style="width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--neon-blue); box-shadow: 0 0 8px rgba(0, 242, 255, 0.1);" alt="${player.name}">
                            <div style="display: flex; align-items: center; min-width: 0; flex-wrap: nowrap; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                                <span style="color: #fff; font-weight: 700; text-transform: uppercase; font-size: 0.95rem; margin-right: 0.5rem; letter-spacing: 0.5px; white-space: nowrap;">${player.name}:</span>
                                <div style="display: inline-flex; flex-wrap: nowrap; gap: 0.25rem;">
                                    ${finalPerfHTML}
                                </div>
                            </div>
                        </div>
                        <a href="player.html?pid=${player.player_id}&objectId=${player.object_id}&name=${encodeURIComponent(player.name)}&role=${encodeURIComponent(player.role)}&opponent=${encodeURIComponent(opponent)}" 
                           target="_blank" class="back-btn" style="padding: 0.2rem 0.45rem; font-size: 0.7rem; border-color: var(--neon-blue); color: var(--neon-blue); background: transparent; flex-shrink: 0; margin-left: 0.5rem;">
                           H2H ➔
                        </a>
                    </div>
                `;
            }

            parentContainer.appendChild(row);
        }

        // Run initializer
        init();
    </script>
</body>
</html>
